title: "Deneb"
tagline: "Engineering meets Science Fiction"
description: >-
  A blog by Sam Rowe exploring AI and the world of technology as it continues
  to evolve — where engineering discipline meets the imagination of science fiction.
url: "https://deneb.co.uk"
baseurl: ""

author:
  name: Sam Rowe
  github: Sam-Rowe
  linkedin: sam-rowe
  github_url: "https://github.com/Sam-Rowe"
  linkedin_url: "https://www.linkedin.com/in/sam-rowe"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Sass
sass:
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Sam Rowe"
