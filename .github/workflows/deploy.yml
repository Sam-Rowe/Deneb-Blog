name: CD — Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Grant the minimum required permissions globally (least privilege)
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Run CI checks before deploying
  # ============================================================
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Spell-check
        run: npm run spellcheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test -- --project=chromium

  # ============================================================
  # Job 2: Build the productionised site
  # ============================================================
  build:
    name: Build site
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        # For a static HTML/CSS/JS site, the build step assembles
        # a clean dist/ directory containing only deployable assets.
        run: |
          mkdir -p dist
          cp -r assets dist/
          cp -r posts dist/
          cp index.html dist/
          cp about.html dist/
          echo "Site assembled in dist/"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  # ============================================================
  # Job 3: Deploy to GitHub Pages
  # ============================================================
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
